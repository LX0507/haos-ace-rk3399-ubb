name: Multi-Target Build
on:
  workflow_dispatch:
    inputs:
      targets:
        description: '构建目标 (逗号分隔: tn3399_v3,rk3399_ubb)'
        required: false
        default: 'tn3399_v3,rk3399_ubb'
  #schedule:
  #  - cron: '0 0 28 * ?'  #  每月28日0时编译，cron表达式，格式为分 时 日 月 周
  #push:
  #  branches: ["master"]
env:
  GIT_TERMINAL_PROMPT: 0  # 禁用终端提示
  GIT_SUBMODULE_STRATEGY: recursive  # 强制递归初始化子模块
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制使用Node.js 24，解决弃用警告
  CACHE_DIR: ${{ github.workspace }}/hassos-cache  # ccache 和构建缓存目录
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 总超时 2 小时，防止 runner 无限挂起
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        target: [rk3399_ubb] # 构建目标
    name: Build ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4.3.0
        with:
          fetch-depth: 1
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.0

      # ============================================================
      # 缓存层 1: ccache 编译缓存 (最大加速项)
      # 当仅修改 DTS 补丁时，defconfig 不变 → 缓存命中 → 跳过大部分编译
      # 预计节省: 60-90% 编译时间 (首次构建无缓存，第二次起生效)
      # ============================================================
      - name: Cache ccache
        id: ccache-cache
        uses: actions/cache@v4
        with:
          path: hassos-cache/cc
          key: ccache-${{ matrix.target }}-${{ hashFiles('haos-overlay/buildroot-external/configs/*_defconfig') }}
          restore-keys: |
            ccache-${{ matrix.target }}-
            ccache-

      # ============================================================
      # 缓存层 2: Buildroot dl/ 源码包缓存
      # 缓存 Linux kernel、U-Boot 等源码 tarball，避免重复下载
      # 预计节省: 10-20 分钟下载时间
      # ============================================================
      - name: Cache Buildroot downloads
        id: dl-cache
        uses: actions/cache@v4
        with:
          path: operating-system/dl
          key: dl-${{ matrix.target }}-${{ hashFiles('haos-overlay/buildroot-external/configs/*_defconfig') }}
          restore-keys: |
            dl-${{ matrix.target }}-
            dl-

      # ============================================================
      # 缓存层 3: Docker 镜像缓存
      # 避免每次重新构建 Docker 构建环境镜像
      # 预计节省: 3-5 分钟
      # ============================================================
      - name: Cache Docker image
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/docker-image
          key: docker-${{ hashFiles('haos-overlay/Dockerfile') }}

      - name: Load cached Docker image
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: |
          docker load -i /tmp/docker-image/hassos.tar
          echo "✅ Docker 镜像从缓存加载"

      - name: Initialization environment and Free up disk space
        run: |
          # 全局设置 DEBIAN_FRONTEND，sudo env_keep 会保留它
          export DEBIAN_FRONTEND=noninteractive
          sudo timedatectl set-timezone "Asia/Shanghai"
          echo "===== 清理前磁盘状态 ====="
          df -h /

          # 杀掉可能持有 dpkg 锁的后台进程（直接 kill，带超时防止 fuser 挂起）
          echo "--- 清理 dpkg 锁 ---"
          sudo timeout 5 fuser -k /var/lib/dpkg/lock-frontend 2>/dev/null || true
          sudo timeout 5 fuser -k /var/lib/apt/lists/lock 2>/dev/null || true
          sudo timeout 5 fuser -k /var/cache/apt/archives/lock 2>/dev/null || true
          sudo killall -9 apt-get dpkg apt unattended-upgrades 2>/dev/null || true
          sleep 2

          # 激进清理：移除大型目录释放磁盘空间
          echo "--- 移除大型目录 ---"
          sudo rm -rf /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/share/dotnet /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

          # 清理 apt 缓存（--kill-after=10 确保 dpkg 被 SIGKILL 兜底）
          echo "--- 清理 apt 缓存 ---"
          sudo timeout --kill-after=10 120 apt-get clean -y || true

          # 清理 Docker 镜像
          echo "--- 清理 Docker 镜像 ---"
          timeout 60 docker system prune -af 2>/dev/null || true

          # 安装必要依赖（--no-install-recommends 避免安装不必要的推荐包）
          echo "--- 安装必要依赖 ---"
          sudo timeout --kill-after=10 180 apt-get install -y --no-install-recommends openssl make gcc xz-utils || \
            echo "⚠️ 依赖安装超时或失败，继续执行"

          echo "===== 清理后磁盘状态 ====="
          df -h /
          echo "===== 缓存命中状态 ====="
          echo "ccache: ${{ steps.ccache-cache.outputs.cache-hit == 'true' && '✅ 命中 (将加速编译)' || '❌ 未命中 (首次构建，无加速)' }}"
          echo "dl/: ${{ steps.dl-cache.outputs.cache-hit == 'true' && '✅ 命中 (将跳过下载)' || '❌ 未命中 (需下载源码)' }}"
          echo "docker: ${{ steps.docker-cache.outputs.cache-hit == 'true' && '✅ 命中 (将跳过镜像构建)' || '❌ 未命中 (需构建镜像)' }}"

      - name: Ensure certificate files exist (核心修复步骤)
        run: |
          # 1. 确保/build目录存在并赋予足够权限
          sudo mkdir -p /build
          sudo chmod 777 /build
          
          # 2. 优先使用仓库密钥生成证书（如果secrets存在）
          if [ -n "${{ secrets.MID_CERT_PEM }}" ] && [ -n "${{ secrets.MID_KEY_PEM }}" ]; then
            # 从secrets写入证书到/build目录（直接写到编译期望的路径）
            echo "${{ secrets.MID_KEY_PEM }}" | sudo tee /build/key.pem > /dev/null
            echo "${{ secrets.MID_CERT_PEM }}" | sudo tee /build/cert.pem > /dev/null
            echo "✅ 使用Secrets中的证书文件"
          else
            # 备用方案：生成自签名证书（避免secrets缺失导致构建失败）
            echo "⚠️ 未配置证书Secrets，生成自签名证书"
            sudo openssl req -x509 -newkey rsa:4096 -keyout /build/key.pem -out /build/cert.pem -days 365 -nodes \
              -subj "/C=CN/ST=Beijing/L=Beijing/O=HAOS/OU=ACE/CN=haos-ace.local"
          fi
          
          # 3. 强制修改文件权限（避免权限不足导致无法读取）
          sudo chmod 644 /build/key.pem /build/cert.pem
          
          # 4. 验证文件是否存在并输出详情（关键排查日志）
          echo "===== 证书文件验证 ====="
          ls -l /build/*.pem
          if [ -f /build/cert.pem ]; then
            echo "✅ /build/cert.pem 存在"
            # 可选：验证证书格式是否正确
            openssl x509 -in /build/cert.pem -noout -subject || echo "⚠️ 证书格式可能有问题，但继续构建"
          else
            echo "❌ /build/cert.pem 缺失，构建终止"
            exit 1
          fi

      - name: Build HAOS-ACE with retry
        shell: 'script -q -e -c "bash {0}"'
        run: |
          mkdir -p hassos-cache
          max_retries=3
          count=0
          until ./build.sh ${{ matrix.target }}; do
            count=$((count+1))
            [[ $count -ge $max_retries ]] && exit 1
            echo "Build failed, retrying in 30s (attempt $count/$max_retries)..."
            sleep 30
          done
          # 保存 Docker 镜像供下次构建使用
          mkdir -p /tmp/docker-image
          docker image inspect hassos:local >/dev/null 2>&1 && \
            docker save hassos:local -o /tmp/docker-image/hassos.tar || true
          # 输出缓存统计
          echo "===== 构建完成 - 缓存统计 ====="
          echo "--- 磁盘使用 ---"
          df -h /
          echo "--- ccache 大小 ---"
          du -sh hassos-cache/cc/ 2>/dev/null || echo "ccache 目录不存在"
          echo "--- dl/ 大小 ---"
          du -sh operating-system/dl/ 2>/dev/null || echo "dl/ 目录不存在"
          echo "--- Docker 镜像大小 ---"
          du -sh /tmp/docker-image/ 2>/dev/null || echo "Docker 镜像未保存"

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.target }}
          path: |
            output/build/*/build.log
            output/legal-info/
          if-no-files-found: ignore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: output/images/haos*
          if-no-files-found: error  # 无文件时触发错误，便于排查

      - name: Get current date
        id: date
        run: echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: output/images/haos*
          tag_name: v17.3-${{ steps.date.outputs.DATE }}-${{ github.run_number }}
          name: "HAOS-ACE v17.3 (Build ${{ github.run_number }})"
          body: |
            自动化构建的 HAOS 17.3 加速版镜像，包含以下文件：
            - haos*.img.xz  压缩烧写镜像
            - haos*.raucb   OTA 更新包

            * HAOS 版本: 17.3
            * 构建日期: ${{ steps.date.outputs.DATE }}
            * Build: ${{ github.run_number }}
            * Commit: ${{ github.sha }}
            * ccache: ${{ steps.ccache-cache.outputs.cache-hit == 'true' && '命中' || '未命中' }}
          draft: false
          prerelease: false
          make_latest: true
