# RK3399 UBB network optimizations
# Increase connection tracking table for Docker
net.netfilter.nf_conntrack_max=131072

# Allow more ephemeral ports for container networking
net.ipv4.ip_local_port_range=1024 65535

# Enable IPv4 forwarding (required for Docker networking)
net.ipv4.ip_forward=1

# Enable IPv6 forwarding
net.ipv6.conf.all.forwarding=1

# Reduce swap usage (RK3399 has limited RAM)
vm.swappiness=10
