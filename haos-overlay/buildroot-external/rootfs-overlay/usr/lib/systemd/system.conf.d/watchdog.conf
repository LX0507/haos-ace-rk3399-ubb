[Manager]
# RK3399 has a DW hardware watchdog (CONFIG_DW_WATCHDOG=y)
# The kernel driver pets the watchdog, preventing timeout reboots.
# RuntimeWatchdogSec=0 means systemd doesn't set an additional timeout
# (the hardware watchdog is managed by the kernel driver directly).
# This prevents the 60-second reboot caused by unpetted hardware watchdog.
RuntimeWatchdogSec=0
ShutdownWatchdogSec=10s
