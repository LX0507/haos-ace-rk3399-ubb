[Unit]
# RK3399 UBB: Don't fail boot if hassos-boot partition is missing
# The boot partition may not be labeled correctly on first flash
# Supervisor can work without /mnt/boot being mounted (kernel/DTB loaded by U-Boot)
# Note: OnFailure expects unit names, not "ignore". To prevent failure
# propagation, we simply don't set OnFailure (default = no action).
# IgnoreOnIsolate prevents this mount from being stopped during isolations.
IgnoreOnIsolate=yes
