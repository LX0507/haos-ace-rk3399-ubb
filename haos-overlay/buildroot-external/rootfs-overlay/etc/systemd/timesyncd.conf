[Time]
# Build #51: 国内可达 NTP (time.cloudflare.com 在国内常被阻断)
#   ntp.aliyun.com  阿里云
#   cn.pool.ntp.org 国内 NTP 池
#   time1.cloud.tencent.com 腾讯云
NTP=ntp.aliyun.com cn.pool.ntp.org time1.cloud.tencent.com
FallbackNTP=ntp.aliyun.com cn.pool.ntp.org time1.cloud.tencent.com
# Speed-up boot as first attempt is done before network is up
ConnectionRetrySec=10
