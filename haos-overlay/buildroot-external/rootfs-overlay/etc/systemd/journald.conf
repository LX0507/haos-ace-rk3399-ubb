[Journal]
# Keep more logs in memory for debugging (RK3399 has enough RAM)
SystemMaxUse=100M
SystemKeepFree=50M
# Forward to serial console for real-time debugging
# Use 'info' not 'debug' to avoid serial buffer overrun at 115200 baud
ForwardToConsole=yes
MaxLevelConsole=info
# Persist to /var/log/journal for post-reboot analysis
Storage=persistent
Compress=yes
SyncIntervalSec=10s
