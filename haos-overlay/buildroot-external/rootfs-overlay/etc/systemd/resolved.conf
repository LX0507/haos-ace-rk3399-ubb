[Resolve]
# 主机 DNS 由 NetworkManager 经 DHCP 注入（路由器 DNS，如 192.168.1.1）。
# 该网络会丢弃发往外部 DNS 服务器的 UDP/53，因此一律使用路由器 DNS，
# 不再强制公共 DNS（强制公共 DNS 反致 checkonline/ghcr.io 解析超时）。
# FallbackDNS 仅在路由器 DNS 全部失效时兜底（外部 DNS 可能被墙，仅作保险）。
FallbackDNS=119.29.29.29 223.5.5.5 114.114.114.114
#Domains=
DNSSEC=no
DNSOverTLS=no
#MulticastDNS=yes
#LLMNR=yes
#Cache=yes
DNSStubListener=no
#ReadEtcHosts=yes
#ResolveUnicastSingleLabel=no
