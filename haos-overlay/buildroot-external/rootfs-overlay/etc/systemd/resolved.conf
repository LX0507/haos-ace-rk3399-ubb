[Resolve]
# Public DNS servers (used by host, not by containers)
DNS=223.5.5.5 8.8.8.8 1.1.1.1
FallbackDNS=8.8.8.8 8.8.4.4 1.1.1.1
# Disable DNSOverTLS - some routers/DNS servers don't support it
DNSOverTLS=no
DNSSEC=no
# Listen on all interfaces (including 172.30.32.1 hassio bridge)
# so containers can use systemd-resolved as DNS server
LLMNR=no
MulticastDNS=no
