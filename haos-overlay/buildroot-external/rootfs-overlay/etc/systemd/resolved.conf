[Resolve]
# Public DNS servers (used by host, not by containers)
# Containers should use hassio_dns (172.30.32.3) instead
DNS=223.5.5.5 8.8.8.8 1.1.1.1
FallbackDNS=8.8.8.8 8.8.4.4 1.1.1.1
# Disable DNSOverTLS - ports 853 may be blocked by user's router
# HA Core can still be downloaded via TCP 443 (HTTPS) which works
DNSOverTLS=no
DNSSEC=no
# Disable LLMNR/mDNS to reduce noise
LLMNR=no
MulticastDNS=no
