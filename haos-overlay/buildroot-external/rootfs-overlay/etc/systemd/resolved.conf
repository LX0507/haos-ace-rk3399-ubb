[Resolve]
#DNS=  (由 NetworkManager 按 end0-china-dns 连接注入 119.29.29.29 等公共 DNS)
# 关键：覆盖 systemd-resolved 编译期默认的 FallbackDNS(1.1.1.1/8.8.8.8 等 Cloudflare/Google)，
# 避免路由器 DNS 探测失败后回退到被墙的 Cloudflare DoT(1.1.1.1:853)。
FallbackDNS=119.29.29.29 223.5.5.5 114.114.114.114
#Domains=
DNSSEC=no
DNSOverTLS=no
#MulticastDNS=yes
#LLMNR=yes
#Cache=yes
DNSStubListener=no
#ReadEtcHosts=yes
#ResolveUnicastSingleLabel=no
