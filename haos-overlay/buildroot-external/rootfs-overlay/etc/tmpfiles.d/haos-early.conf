# HAOS RK3399 - Ensure critical files exist early in boot
# This runs before systemd services start
f /etc/hosts 0644 root root - 127.0.0.1\tlocalhost localhost.localdomain homeassistant\n::1\t\tlocalhost localhost.localdomain homeassistant\n
f /etc/hostname 0644 root root - homeassistant
d /mnt/overlay/etc 0755 root root -
d /mnt/data/docker 0755 root root -
d /run/docker 0755 root root -
