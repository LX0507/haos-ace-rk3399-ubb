[main]
dns=default
plugins=keyfile
autoconnect-retries-default=0
rc-manager=file

[global-dns]
# 国内网络兜底：无论哪个 NM 连接被激活（含 supervisor 接管的 “Supervisor end0”），
# 都强制把公共 DNS 注入为系统级 DNS，绕开路由器 DNS(192.168.1.1) 对
# checkonline.home-assistant.io / ghcr.io 解析超时的问题。
dns=119.29.29.29;223.5.5.5;114.114.114.114

[keyfile]
unmanaged-devices=type:bridge;type:tun;driver:veth

[logging]
backend=journal

[connection]
connection.mdns=2
connection.llmnr=2
wifi.powersave=2

[connectivity]
uri=https://gitee.com/lansilence/ha-version/raw/master/online.txt
interval=600

[device]
wifi.scan-rand-mac-address=no
