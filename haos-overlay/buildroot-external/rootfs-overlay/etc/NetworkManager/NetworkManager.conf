[main]
dns=default
plugins=keyfile
autoconnect-retries-default=5
rc-manager=file

[keyfile]
unmanaged-devices=type:bridge;type:tun;driver:veth

[logging]
backend=journal

[connection]
connection.mdns=2
connection.llmnr=2

[connectivity]
uri=https://gitee.com/lansilence/ha-version/raw/master/online.txt
interval=600

[device]
wifi.scan-rand-mac-address=no
# RK3399: DHCP timeout and retry settings
dhcp=timeout=30,duid=en

[ifupdown]
managed=false
