[main]
dns=default
plugins=keyfile
# 0 = infinite retries (matches HAOS upstream, survives Supervisor reactivation)
autoconnect-retries-default=0
rc-manager=file

[keyfile]
unmanaged-devices=type:bridge;type:tun;driver:veth

[logging]
backend=journal

# ============================================================
# Connection defaults
# NM 1.50 changed default DHCP client-id from mac to duid.
# Some routers reject duid-based DHCP requests.
# Fix: explicitly set client-id to mac for maximum compatibility.
# ============================================================
[connection]
connection.mdns=2
connection.llmnr=2
wifi.powersave=2
# DHCP compatibility (NM 1.50 default changed to 'duid' which some routers reject)
ipv4.dhcp-client-id=mac
ipv6.dhcp-duid=ll
# No timeout — wait indefinitely for DHCP server response
ipv4.dhcp-timeout=0
ipv6.dhcp-timeout=0
# Send hostname to router
ipv4.dhcp-send-hostname=true
ipv6.dhcp-send-hostname=true

[connectivity]
uri=http://checkonline.home-assistant.io/online.txt
interval=600

[device]
wifi.scan-rand-mac-address=no
