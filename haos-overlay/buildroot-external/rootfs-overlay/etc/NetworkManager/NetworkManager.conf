[main]
# Use default DNS processing (NM updates /etc/resolv.conf)
# This is the recommended value when using systemd-resolved
dns=default
plugins=keyfile
# 0 = infinite retries (matches HAOS upstream default)
# DHCP failures during boot should be retried indefinitely
autoconnect-retries-default=0
# rc-manager=file means NM writes /etc/resolv.conf directly (HAOS upstream default)
rc-manager=file

[keyfile]
# Don't manage virtual bridge/tun/veth interfaces (HAOS uses them for containers)
unmanaged-devices=type:bridge;type:tun;driver:veth

[logging]
backend=journal

# ============================================================
# Connection defaults
# NOTE: ipv4.dns is NOT supported in [connection] section
# We use [global-dns] below to force DNS for all connections
# ============================================================
[connection]
connection.mdns=2
connection.llmnr=2
wifi.powersave=2

# ============================================================
# Global DNS - force DNS for all connections
# This OVERRIDES any DNS settings in individual connections
# Available since NetworkManager 1.42
# ============================================================
[global-dns]
searches=lan

[global-dns-domain-*]
servers=223.5.5.5,8.8.8.8,1.1.1.1

# Use HAOS upstream connectivity check
[connectivity]
uri=http://checkonline.home-assistant.io/online.txt
interval=600

[device]
wifi.scan-rand-mac-address=no
