[main]
dns=default
plugins=keyfile
# 0 = infinite retries (matches HAOS upstream, survives Supervisor reactivation)
autoconnect-retries-default=0
rc-manager=file

[keyfile]
unmanaged-devices=type:bridge;type:tun;driver:veth

[logging]
backend=journal

# ============================================================
# Connection defaults
# DHCPv4 兼容：用户网络下其他设备(PC/手机)能正常拿 IPv4，
# 但它们通常不发送 DHCP option 61 客户端标识符。
# NM internal 插件默认 client-id=mac(option 61, type 01)，
# 部分家用路由器会拒绝该类型 client-id → 仅 IPv6 成功、IPv4 失败。
# 设为 'none' 让 NM 不发送 client-id(仅用 chaddr 中的 MAC)，
# 行为与普通设备一致，兼容性最佳。
# 若仍失败，烧录后用 'nmcli connection show "Supervisor end0"'
# 与 'journalctl -u NetworkManager' 诊断(Supervisor 可能覆盖该值)。
# ============================================================
[connection]
connection.mdns=2
connection.llmnr=2
wifi.powersave=2
# 不发送 DHCP client-id，模拟标准设备行为（见上方说明）
ipv4.dhcp-client-id=none
ipv6.dhcp-duid=ll
# No timeout — wait indefinitely for DHCP server response
ipv4.dhcp-timeout=0
ipv6.dhcp-timeout=0
# Send hostname to router
ipv4.dhcp-send-hostname=true
ipv6.dhcp-send-hostname=true

[connectivity]
uri=http://checkonline.home-assistant.io/online.txt
interval=600

[device]
wifi.scan-rand-mac-address=no
